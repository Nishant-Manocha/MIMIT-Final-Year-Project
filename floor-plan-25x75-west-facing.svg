<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .plot { fill: #f7f4ee; stroke: #1f2937; stroke-width: 4; }
      .wall { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .setback { fill: #e8f4dd; stroke: #2f6f3e; stroke-width: 2.5; }
      .porch { fill: #e8edf7; stroke: #365a91; stroke-width: 2.5; }
      .service { fill: #fff2cc; stroke: #8a6d1f; stroke-width: 2.5; }
      .bath { fill: #dff4f6; stroke: #17737c; stroke-width: 2.5; }
      .closet { fill: #f4e2f7; stroke: #7a3b86; stroke-width: 2.5; }
      .label { font-family: Arial, Helvetica, sans-serif; fill: #111827; font-size: 18px; font-weight: 700; text-anchor: middle; }
      .small { font-size: 14px; font-weight: 600; }
      .note { font-size: 16px; font-weight: 600; fill: #374151; }
      .dim { font-size: 15px; fill: #374151; font-weight: 600; }
      .door { stroke: #b45309; stroke-width: 4; fill: none; }
      .open { stroke: #6b7280; stroke-width: 3; stroke-dasharray: 8 8; }
      .road { fill: #d1d5db; }
    </style>
  </defs>

  <text x="600" y="32" class="label" style="font-size:24px;">Concept Floor Plan - 25 ft x 75 ft West Facing Plot</text>
  <text x="60" y="82" class="note">West / Road / Gate Side</text>
  <rect x="18" y="110" width="34" height="350" class="road"/>
  <text x="35" y="292" class="label small" transform="rotate(-90 35 292)">ROAD</text>

  <!-- Plot boundary: 75 ft deep x 25 ft wide, scale 14 px = 1 ft -->
  <rect x="60" y="110" width="1050" height="350" class="plot"/>

  <!-- Front open area, 15 ft deep -->
  <rect x="60" y="110" width="210" height="175" class="porch"/>
  <rect x="60" y="285" width="210" height="175" class="setback"/>
  <text x="165" y="184" class="label">Porch / Parking</text>
  <text x="165" y="209" class="label small">15' x 12'-6"</text>
  <text x="165" y="359" class="label">Park / Garden</text>
  <text x="165" y="384" class="label small">15' x 12'-6"</text>

  <!-- Main house built area from 15 ft to 75 ft -->
  <rect x="270" y="110" width="840" height="350" class="wall"/>

  <!-- Living / dining: 20 ft x 25 ft -->
  <rect x="270" y="110" width="280" height="350" class="wall"/>
  <text x="410" y="260" class="label">Living + Dining</text>
  <text x="410" y="286" class="label small">20' x 25'</text>
  <text x="410" y="314" class="label small">Main entry from west</text>

  <!-- Open kitchen and passage zone: 13 ft x 25 ft -->
  <rect x="550" y="110" width="182" height="168" class="service"/>
  <text x="641" y="181" class="label">Open Kitchen</text>
  <text x="641" y="206" class="label small">13' x 12'</text>
  <line x1="550" y1="278" x2="732" y2="278" class="open"/>
  <rect x="550" y="278" width="182" height="182" class="wall"/>
  <text x="641" y="353" class="label">Lobby / Passage</text>
  <text x="641" y="378" class="label small">13' x 13'</text>

  <!-- Two bedrooms: 14 ft deep x 12.5 ft wide each -->
  <rect x="732" y="110" width="196" height="175" class="wall"/>
  <text x="830" y="184" class="label">Guest Room</text>
  <text x="830" y="209" class="label small">14' x 12'-6"</text>
  <rect x="732" y="285" width="196" height="175" class="wall"/>
  <text x="830" y="359" class="label">Bedroom 2</text>
  <text x="830" y="384" class="label small">14' x 12'-6"</text>

  <!-- Common bathroom near bedrooms -->
  <rect x="550" y="278" width="80" height="84" class="bath"/>
  <text x="590" y="314" class="label small">Common</text>
  <text x="590" y="333" class="label small">Bath</text>
  <text x="590" y="351" class="label small">5'-9" x 6'</text>

  <!-- Master suite: 13 ft deep x 25 ft wide with attached bath and WIC -->
  <rect x="928" y="110" width="182" height="350" class="wall"/>
  <rect x="928" y="110" width="182" height="210" class="wall"/>
  <text x="1019" y="200" class="label">Master Bedroom</text>
  <text x="1019" y="225" class="label small">13' x 15'</text>
  <rect x="928" y="320" width="84" height="140" class="closet"/>
  <text x="970" y="381" class="label small">Walk-in</text>
  <text x="970" y="400" class="label small">Closet</text>
  <text x="970" y="418" class="label small">6' x 10'</text>
  <rect x="1012" y="320" width="98" height="140" class="bath"/>
  <text x="1061" y="381" class="label small">Attached</text>
  <text x="1061" y="400" class="label small">Bath</text>
  <text x="1061" y="418" class="label small">7' x 10'</text>

  <!-- Suggested doors / openings -->
  <path d="M270 260 L300 260" class="door"/>
  <path d="M550 250 L550 215" class="door"/>
  <path d="M732 255 L762 255" class="door"/>
  <path d="M732 330 L762 330" class="door"/>
  <path d="M928 255 L958 255" class="door"/>
  <path d="M1012 340 L1038 340" class="door"/>
  <path d="M928 340 L954 340" class="door"/>

  <!-- Dimension guides -->
  <line x1="60" y1="485" x2="1110" y2="485" stroke="#374151" stroke-width="2"/>
  <line x1="60" y1="477" x2="60" y2="493" stroke="#374151" stroke-width="2"/>
  <line x1="1110" y1="477" x2="1110" y2="493" stroke="#374151" stroke-width="2"/>
  <text x="585" y="510" class="dim" text-anchor="middle">75 ft plot depth</text>

  <line x1="1132" y1="110" x2="1132" y2="460" stroke="#374151" stroke-width="2"/>
  <line x1="1124" y1="110" x2="1140" y2="110" stroke="#374151" stroke-width="2"/>
  <line x1="1124" y1="460" x2="1140" y2="460" stroke="#374151" stroke-width="2"/>
  <text x="1162" y="292" class="dim" transform="rotate(90 1162 292)" text-anchor="middle">25 ft plot width</text>

  <text x="60" y="95" class="dim">N</text>
  <text x="1110" y="95" class="dim" text-anchor="end">E</text>
</svg>
